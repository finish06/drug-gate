name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./... -short -count=1

      - name: Integration Tests
        run: REDIS_URL=localhost:6379 go test -tags=integration -count=1 -v ./...

      - name: Coverage
        run: |
          go test $(go list ./... | grep -v /cmd/) -tags=integration -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1
        env:
          REDIS_URL: localhost:6379

      - name: Build
        run: go build ./cmd/server

  publish:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=beta-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to private registry
        uses: docker/login-action@v3
        with:
          registry: dockerhub.calebdunn.tech
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beta
        if: steps.version.outputs.is_release == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          tags: dockerhub.calebdunn.tech/finish06/drug-gate:beta

      - name: Trigger staging deploy
        if: steps.version.outputs.is_release == 'false' && success()
        run: |
          BODY='{"app":"drug-gate","ref":"${{ github.ref }}","sha":"${{ github.sha }}","tag":"${{ steps.version.outputs.tag }}"}'
          SIGNATURE="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $NF}')"
          echo "Triggering staging deploy..."
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
            -X POST "${{ secrets.STAGING_WEBHOOK_URL }}/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY")
          echo "Deploy response (HTTP $HTTP_CODE):"
          cat /tmp/deploy-response.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Staging deploy returned HTTP $HTTP_CODE"
          fi
        continue-on-error: true

      - name: Build and push release
        if: steps.version.outputs.is_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=v${{ steps.version.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          tags: |
            dockerhub.calebdunn.tech/finish06/drug-gate:${{ steps.version.outputs.tag }}
            dockerhub.calebdunn.tech/finish06/drug-gate:latest
            ghcr.io/finish06/drug-gate:${{ steps.version.outputs.tag }}
            ghcr.io/finish06/drug-gate:latest
