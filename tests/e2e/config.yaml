log_level: debug

endpoints:
  - slug: fda-ndc
    base_url: https://api.fda.gov
    path: /drug/ndc.json
    format: json
    pagination_style: offset
    pagesize: 100
    data_key: results
    total_key: meta.results.total
    search_params:
      - "brand_name:\"{BRAND_NAME}\""
      - "generic_name:\"{GENERIC_NAME}\""
      - "product_ndc:\"{NDC}\""
      - "pharm_class:\"{PHARM_CLASS}\""

  - slug: drugnames
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/drugnames
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100

  - slug: drugclasses
    base_url: https://dailymed.nlm.nih.gov/dailymed/services
    path: /v2/drugclasses.json
    format: json
    pagination: all
    page_param: page
    pagesize_param: pagesize
    pagesize: 100
