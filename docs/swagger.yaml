basePath: /
definitions:
  github_com_finish06_drug-gate_internal_model.DrugClass:
    properties:
      name:
        type: string
      type:
        type: string
    type: object
  github_com_finish06_drug-gate_internal_model.DrugClassResponse:
    properties:
      brand_names:
        items:
          type: string
        type: array
      classes:
        items:
          $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugClass'
        type: array
      generic_name:
        type: string
      query_name:
        type: string
    type: object
  github_com_finish06_drug-gate_internal_model.DrugDetailResponse:
    properties:
      classes:
        items:
          type: string
        type: array
      generic_name:
        type: string
      name:
        type: string
      ndc:
        type: string
    type: object
  github_com_finish06_drug-gate_internal_model.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  github_com_finish06_drug-gate_internal_model.PaginatedResponse:
    properties:
      data: {}
      pagination:
        $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.Pagination'
    type: object
  github_com_finish06_drug-gate_internal_model.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
host: localhost:8081
info:
  contact: {}
  description: Drug information gateway — NDC lookup, therapeutic classes, and more.
  title: drug-gate API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status and build version.
      produces:
      - application/json
      responses:
        "200":
          description: status and version
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /openapi.json:
    get:
      description: Returns the generated OpenAPI specification as JSON.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: OpenAPI spec
      tags:
      - system
  /v1/drugs/class:
    get:
      description: Looks up a drug by generic or brand name and returns its pharmacological
        classes, brand names, and generic name. Tries generic name first, falls back
        to brand name.
      parameters:
      - description: Drug name (generic or brand, e.g. simvastatin, Zocor)
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugClassResponse'
        "400":
          description: Missing or empty name parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: Drug not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      summary: Look up drug class by name
      tags:
      - drugs
  /v1/drugs/classes:
    get:
      description: 'Returns a paginated list of pharmacological drug classes from
        DailyMed. Defaults to EPC (Established Pharmacologic Class) type. Supports
        filtering by type: epc, moa, pe, cs, or all.'
      parameters:
      - description: 'Filter by class type (default: epc)'
        enum:
        - epc
        - moa
        - pe
        - cs
        - all
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      summary: List drug classes
      tags:
      - drugs
  /v1/drugs/classes/drugs:
    get:
      description: Returns a paginated list of drugs belonging to a specific pharmacological
        class, resolved via FDA NDC data. Returns empty data (not 404) for unknown
        classes.
      parameters:
      - description: Pharmacological class name (e.g. HMG-CoA Reductase Inhibitor)
        in: query
        name: class
        required: true
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 100, max: 500)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "400":
          description: Missing or empty class parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      summary: List drugs in a class
      tags:
      - drugs
  /v1/drugs/names:
    get:
      description: Returns a paginated list of drug names from the DailyMed dataset.
        Supports case-insensitive substring search and type filtering (generic/brand).
      parameters:
      - description: Search substring filter (case-insensitive)
        in: query
        name: q
        type: string
      - description: 'Filter by type: generic, brand, or all'
        enum:
        - generic
        - brand
        - all
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      summary: List drug names
      tags:
      - drugs
  /v1/drugs/ndc/{ndc}:
    get:
      description: Accepts a product NDC (dash-separated), queries cash-drugs upstream,
        and returns drug name, generic name, and therapeutic classes. Supports 5-4,
        4-4, and 5-3 formats with automatic fallback to padded 5-4.
      parameters:
      - description: Product NDC with dash (e.g. 58151-158, 0069-3150, 00069-315)
        in: path
        name: ndc
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      summary: Look up drug by NDC
      tags:
      - drugs
swagger: "2.0"
