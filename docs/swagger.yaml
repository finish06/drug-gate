basePath: /
definitions:
  apikey.APIKey:
    properties:
      active:
        type: boolean
      app_name:
        type: string
      created_at:
        type: string
      expires_at:
        type: string
      key:
        type: string
      origins:
        items:
          type: string
        type: array
      rate_limit:
        type: integer
    type: object
  handler.cacheClearResult:
    properties:
      keys_deleted:
        type: integer
      status:
        type: string
    type: object
  handler.createKeyRequest:
    properties:
      app_name:
        type: string
      origins:
        items:
          type: string
        type: array
      rate_limit:
        type: integer
    type: object
  handler.rotateKeyRequest:
    properties:
      grace_period:
        type: string
    type: object
  handler.rotateKeyResponse:
    properties:
      new_key:
        type: string
      old_key:
        type: string
      old_key_expires_at:
        type: string
    type: object
  model.DrugCheckResult:
    properties:
      error:
        type: string
      has_interactions:
        type: boolean
      input_name:
        type: string
      input_type:
        type: string
      resolved_name:
        type: string
      spl_setid:
        type: string
    type: object
  model.DrugClass:
    properties:
      name:
        type: string
      type:
        type: string
    type: object
  model.DrugClassResponse:
    properties:
      brand_names:
        items:
          type: string
        type: array
      classes:
        items:
          $ref: '#/definitions/model.DrugClass'
        type: array
      generic_name:
        type: string
      query_name:
        type: string
    type: object
  model.DrugDetailResponse:
    properties:
      classes:
        items:
          type: string
        type: array
      generic_name:
        type: string
      name:
        type: string
      ndc:
        type: string
    type: object
  model.DrugIdentifier:
    properties:
      name:
        type: string
      ndc:
        type: string
    type: object
  model.DrugInfoResponse:
    properties:
      drug_name:
        type: string
      input_type:
        type: string
      input_value:
        type: string
      interactions:
        items:
          $ref: '#/definitions/model.InteractionSection'
        type: array
      spl:
        $ref: '#/definitions/model.SPLSource'
    type: object
  model.DrugNameEntry:
    properties:
      name:
        type: string
      type:
        type: string
    type: object
  model.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  model.InteractionCheckRequest:
    properties:
      drugs:
        items:
          $ref: '#/definitions/model.DrugIdentifier'
        type: array
    type: object
  model.InteractionCheckResponse:
    properties:
      checked_pairs:
        type: integer
      drugs:
        items:
          $ref: '#/definitions/model.DrugCheckResult'
        type: array
      found_interactions:
        type: integer
      interactions:
        items:
          $ref: '#/definitions/model.InteractionMatch'
        type: array
    type: object
  model.InteractionMatch:
    properties:
      drug_a:
        type: string
      drug_b:
        type: string
      section_title:
        type: string
      source:
        type: string
      spl_setid:
        type: string
      text:
        type: string
    type: object
  model.InteractionSection:
    properties:
      text:
        type: string
      title:
        type: string
    type: object
  model.PaginatedResponse:
    properties:
      data: {}
      pagination:
        $ref: '#/definitions/model.Pagination'
    type: object
  model.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  model.RxNormCandidate:
    properties:
      name:
        type: string
      rxcui:
        type: string
      score:
        type: integer
    type: object
  model.RxNormConcept:
    properties:
      name:
        type: string
      rxcui:
        type: string
    type: object
  model.RxNormGenericResponse:
    properties:
      generics:
        items:
          $ref: '#/definitions/model.RxNormConcept'
        type: array
      rxcui:
        type: string
    type: object
  model.RxNormNDCResponse:
    properties:
      ndcs:
        items:
          type: string
        type: array
      rxcui:
        type: string
    type: object
  model.RxNormProfile:
    properties:
      brand_names:
        items:
          type: string
        type: array
      generic:
        $ref: '#/definitions/model.RxNormConcept'
      name:
        type: string
      ndcs:
        items:
          type: string
        type: array
      query:
        type: string
      related:
        $ref: '#/definitions/model.RxNormRelatedResponse'
      rxcui:
        type: string
    type: object
  model.RxNormRelatedResponse:
    properties:
      brand_names:
        items:
          $ref: '#/definitions/model.RxNormConcept'
        type: array
      branded_drugs:
        items:
          $ref: '#/definitions/model.RxNormConcept'
        type: array
      clinical_drugs:
        items:
          $ref: '#/definitions/model.RxNormConcept'
        type: array
      dose_forms:
        items:
          $ref: '#/definitions/model.RxNormConcept'
        type: array
      ingredients:
        items:
          $ref: '#/definitions/model.RxNormConcept'
        type: array
      rxcui:
        type: string
    type: object
  model.RxNormSearchResult:
    properties:
      candidates:
        items:
          $ref: '#/definitions/model.RxNormCandidate'
        type: array
      query:
        type: string
      suggestions:
        items:
          type: string
        type: array
    type: object
  model.SPLDetail:
    properties:
      interactions:
        items:
          $ref: '#/definitions/model.InteractionSection'
        type: array
      published_date:
        type: string
      setid:
        type: string
      spl_version:
        type: integer
      title:
        type: string
    type: object
  model.SPLSource:
    properties:
      published_date:
        type: string
      setid:
        type: string
      spl_version:
        type: integer
      title:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: Drug information gateway — NDC lookup, therapeutic classes, and more.
  title: drug-gate API
  version: 0.1.0
paths:
  /admin/cache:
    delete:
      description: Deletes all cache keys matching cache:*, or a subset matching cache:{prefix}*
        if the prefix query parameter is provided. Does not affect API key or rate
        limit data.
      parameters:
      - description: Key prefix filter (e.g. rxnorm, drugnames)
        in: query
        name: prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.cacheClearResult'
        "502":
          description: Redis unavailable
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Clear Redis cache
      tags:
      - admin
  /admin/keys:
    get:
      description: Returns all provisioned API keys with metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/apikey.APIKey'
            type: array
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: List all API keys
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Provisions a new publishable API key with app name, allowed origins,
        and rate limit.
      parameters:
      - description: Key creation parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/apikey.APIKey'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Create API key
      tags:
      - admin
  /admin/keys/{key}:
    delete:
      description: Marks an API key as inactive. The key remains retrievable but will
        be rejected by auth middleware.
      parameters:
      - description: API key to deactivate
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'status: deactivated'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Deactivate API key
      tags:
      - admin
    get:
      description: Returns metadata for a specific API key.
      parameters:
      - description: API key (e.g. pk_abc123)
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apikey.APIKey'
        "404":
          description: Key not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Get API key details
      tags:
      - admin
  /admin/keys/{key}/rotate:
    post:
      consumes:
      - application/json
      description: Creates a new key with the same metadata and sets a grace period
        expiration on the old key. Both keys are valid during the grace period.
      parameters:
      - description: API key to rotate
        in: path
        name: key
        required: true
        type: string
      - description: Grace period for old key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.rotateKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.rotateKeyResponse'
        "400":
          description: Invalid request or grace period
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Rotate API key
      tags:
      - admin
  /health:
    get:
      description: Returns service health status and build version.
      produces:
      - application/json
      responses:
        "200":
          description: status and version
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /openapi.json:
    get:
      description: Returns the generated OpenAPI specification as JSON.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: OpenAPI spec
      tags:
      - system
  /v1/drugs/autocomplete:
    get:
      description: Returns drug names matching the given prefix. Fast typeahead endpoint
        for building search UIs.
      parameters:
      - description: Prefix to match (min 2 chars)
        in: query
        name: q
        required: true
        type: string
      - description: 'Max results (default: 10, max: 50)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/model.DrugNameEntry'
              type: array
            type: object
        "400":
          description: Missing or invalid q parameter
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Drug name autocomplete
      tags:
      - drugs
  /v1/drugs/class:
    get:
      description: Looks up a drug by generic or brand name and returns its pharmacological
        classes, brand names, and generic name. Tries generic name first, falls back
        to brand name.
      parameters:
      - description: Drug name (generic or brand, e.g. simvastatin, Zocor)
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DrugClassResponse'
        "400":
          description: Missing or empty name parameter
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Drug not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Look up drug class by name
      tags:
      - drugs
  /v1/drugs/classes:
    get:
      description: 'Returns a paginated list of pharmacological drug classes from
        DailyMed. Defaults to EPC (Established Pharmacologic Class) type. Supports
        filtering by type: epc, moa, pe, cs, or all.'
      parameters:
      - description: 'Filter by class type (default: epc)'
        enum:
        - epc
        - moa
        - pe
        - cs
        - all
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: List drug classes
      tags:
      - drugs
  /v1/drugs/classes/drugs:
    get:
      description: Returns a paginated list of drugs belonging to a specific pharmacological
        class, resolved via FDA NDC data. Returns empty data (not 404) for unknown
        classes.
      parameters:
      - description: Pharmacological class name (e.g. HMG-CoA Reductase Inhibitor)
        in: query
        name: class
        required: true
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 100, max: 500)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "400":
          description: Missing or empty class parameter
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: List drugs in a class
      tags:
      - drugs
  /v1/drugs/info:
    get:
      description: Look up a single drug by name or NDC and return SPL metadata plus
        parsed interaction sections. NDC is normalized and resolved to drug name internally.
      parameters:
      - description: Drug name
        in: query
        name: name
        type: string
      - description: NDC code (any format)
        in: query
        name: ndc
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DrugInfoResponse'
        "400":
          description: Missing name or ndc
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: NDC not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Drug info card with interactions
      tags:
      - spl
  /v1/drugs/interactions:
    post:
      consumes:
      - application/json
      description: Submit 2-10 drug identifiers (name or NDC) and get cross-referenced
        interaction warnings from FDA SPL labels. Each drug's Section 7 is searched
        for mentions of the other drugs.
      parameters:
      - description: Drug identifiers to check
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.InteractionCheckRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.InteractionCheckResponse'
        "400":
          description: Too few/many drugs or invalid input
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Check drug interactions
      tags:
      - spl
  /v1/drugs/names:
    get:
      description: Returns a paginated list of drug names from the DailyMed dataset.
        Supports case-insensitive substring search and type filtering (generic/brand).
      parameters:
      - description: Search substring filter (case-insensitive)
        in: query
        name: q
        type: string
      - description: 'Filter by type: generic, brand, or all'
        enum:
        - generic
        - brand
        - all
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: List drug names
      tags:
      - drugs
  /v1/drugs/ndc/{ndc}:
    get:
      description: Accepts a product NDC (dash-separated), queries cash-drugs upstream,
        and returns drug name, generic name, and therapeutic classes. Supports 5-4,
        4-4, and 5-3 formats with automatic fallback to padded 5-4.
      parameters:
      - description: Product NDC with dash (e.g. 58151-158, 0069-3150, 00069-315)
        in: path
        name: ndc
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.DrugDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Look up drug by NDC
      tags:
      - drugs
  /v1/drugs/rxnorm/{rxcui}/generics:
    get:
      description: Returns generic product information for the given RxNorm concept
        identifier.
      parameters:
      - description: RxNorm concept unique identifier
        in: path
        name: rxcui
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RxNormGenericResponse'
        "404":
          description: RxCUI not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Get generic products for an RxCUI
      tags:
      - rxnorm
  /v1/drugs/rxnorm/{rxcui}/ndcs:
    get:
      description: Returns NDC codes associated with the given RxNorm concept identifier.
      parameters:
      - description: RxNorm concept unique identifier
        in: path
        name: rxcui
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RxNormNDCResponse'
        "404":
          description: RxCUI not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Get NDCs for an RxCUI
      tags:
      - rxnorm
  /v1/drugs/rxnorm/{rxcui}/related:
    get:
      description: Returns all related concepts grouped by type (ingredients, brand
        names, dose forms, clinical drugs, branded drugs).
      parameters:
      - description: RxNorm concept unique identifier
        in: path
        name: rxcui
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RxNormRelatedResponse'
        "404":
          description: RxCUI not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Get related concepts for an RxCUI
      tags:
      - rxnorm
  /v1/drugs/rxnorm/profile:
    get:
      description: Resolves a drug name via approximate match, then assembles NDCs,
        generic equivalents, and related concepts into a single response.
      parameters:
      - description: Drug name (generic or brand)
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RxNormProfile'
        "400":
          description: Missing name parameter
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: Drug not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Get unified drug profile
      tags:
      - rxnorm
  /v1/drugs/rxnorm/search:
    get:
      description: Approximate match search via RxNorm. Returns up to 5 candidates
        ranked by score. Includes spelling suggestions when no matches are found.
      parameters:
      - description: Drug name to search for
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RxNormSearchResult'
        "400":
          description: Missing name parameter
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "404":
          description: No drugs found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Search drugs by name (RxNorm)
      tags:
      - rxnorm
  /v1/drugs/spls:
    get:
      description: Search Structured Product Labels by drug name. Returns paginated
        SPL metadata from DailyMed.
      parameters:
      - description: Drug name to search
        in: query
        name: name
        required: true
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.PaginatedResponse'
        "400":
          description: Missing name parameter
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Search SPL documents
      tags:
      - spl
  /v1/drugs/spls/{setid}:
    get:
      description: Retrieve SPL metadata and parsed Drug Interactions (Section 7)
        from the SPL XML document.
      parameters:
      - description: SPL set ID (UUID format)
        in: path
        name: setid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.SPLDetail'
        "404":
          description: SPL not found
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "502":
          description: Upstream service error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      summary: Get SPL detail with interactions
      tags:
      - spl
  /version:
    get:
      description: Returns build version, git commit, git branch, and Go runtime version.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Build version info
      tags:
      - public
swagger: "2.0"
