basePath: /
definitions:
  github_com_finish06_drug-gate_internal_model.DrugDetailResponse:
    properties:
      classes:
        items:
          type: string
        type: array
      generic_name:
        type: string
      name:
        type: string
      ndc:
        type: string
    type: object
  github_com_finish06_drug-gate_internal_model.ErrorResponse:
    properties:
