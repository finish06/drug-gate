    type: object
info:
  contact:
    name: drug-gate on GitHub
    url: https://github.com/finish06/drug-gate
  description: |-
    Open-source drug information gateway. Provides NDC lookup, therapeutic class search, drug interactions, RxNorm fuzzy search, and structured product label data — all through a clean REST API with Redis caching, per-key rate limiting, and circuit breaker protection.

    ## Getting Started
    1. **Create an API key:** `POST /admin/keys` with `Authorization: Bearer {ADMIN_SECRET}` and body `{"app_name": "my-app", "origins": ["*"], "rate_limit": 1000}`
    2. **Search for a drug:** `GET /v1/drugs/autocomplete?q=lipit` with header `X-API-Key: {your_key}` — returns matching drug names
    3. **Look up details:** `GET /v1/drugs/class?name=atorvastatin` — returns therapeutic classes and brand names
    4. **Get interactions:** `GET /v1/drugs/info?name=warfarin` — returns FDA label interaction warnings
    5. **Check multi-drug interactions:** `POST /v1/drugs/interactions` with `{"drugs": [{"name": "warfarin"}, {"name": "aspirin"}]}`
  license:
    name: MIT
    url: https://github.com/finish06/drug-gate/blob/main/LICENSE
  title: drug-gate API
  version: 0.9.0
paths:
  /admin/cache:
    delete:
      description: Deletes all cache keys matching cache:*, or a subset matching cache:{prefix}*
        if the prefix query parameter is provided. Uses SCAN to iterate keys safely
        without blocking Redis. Does not affect API key or rate limit data stored
        under other key namespaces.
      parameters:
      - description: Key prefix filter (e.g. rxnorm, drugnames)
        example: rxnorm
        in: query
        name: prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.cacheClearResult'
        "401":
          description: Missing or invalid admin bearer token
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Redis unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Clear Redis cache
      tags:
      - admin
  /admin/keys:
    get:
      description: Returns all provisioned API keys with their metadata including
        app name, allowed origins, rate limit, active status, and creation timestamp.
        Use this to audit which keys are active and their configurations.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_finish06_drug-gate_internal_apikey.APIKey'
            type: array
        "401":
          description: Missing or invalid admin bearer token
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - AdminAuth: []
      summary: List all API keys
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: Provisions a new publishable API key (pk_*) with the specified
        app name, allowed CORS origins, and per-minute rate limit. The full key value
        is only returned in this response and cannot be retrieved later. Store it
        securely.
      parameters:
      - description: Key creation parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.createKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_apikey.APIKey'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid admin bearer token
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Create API key
      tags:
      - admin
  /admin/keys/{key}:
    delete:
      description: Marks an API key as inactive. The key record remains retrievable
        via GET for auditing purposes, but all requests using this key will be rejected
        by the auth middleware with a 401 response.
      parameters:
      - description: API key to deactivate
        example: pk_abc123def456
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'status: deactivated'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing or invalid admin bearer token
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Deactivate API key
      tags:
      - admin
    get:
      description: Returns metadata for a specific API key including app name, allowed
        origins, rate limit, active status, and expiration. Use this to inspect a
        single key's configuration.
      parameters:
      - description: API key
        example: pk_abc123def456
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_apikey.APIKey'
        "401":
          description: Missing or invalid admin bearer token
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: Key not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Get API key details
      tags:
      - admin
  /admin/keys/{key}/rotate:
    post:
      consumes:
      - application/json
      description: Creates a new API key with the same app name, origins, and rate
        limit as the old key, then sets a grace period expiration on the old key.
        Both old and new keys are valid during the grace period, allowing clients
        to migrate without downtime. After the grace period expires, the old key is
        automatically rejected.
      parameters:
      - description: API key to rotate
        example: pk_abc123def456
        in: path
        name: key
        required: true
        type: string
      - description: Grace period for old key (Go duration, e.g. 24h, 72h)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.rotateKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.rotateKeyResponse'
        "400":
          description: Invalid request or grace period
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid admin bearer token
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - AdminAuth: []
      summary: Rotate API key
      tags:
      - admin
  /health:
    get:
      description: Returns service health status, build version, and dependency health
        for Redis, the upstream cash-drugs API, and the circuit breaker. Returns 200
        when all dependencies are healthy and 503 when any dependency is degraded.
        Use this endpoint for load balancer health probes and monitoring dashboards.
      produces:
      - application/json
      responses:
        "200":
          description: All dependencies healthy
          schema:
            $ref: '#/definitions/internal_handler.HealthResponse'
        "503":
          description: One or more dependencies unhealthy
          schema:
            $ref: '#/definitions/internal_handler.HealthResponse'
      summary: Health check
      tags:
      - system
  /openapi.json:
    get:
      description: Returns the generated OpenAPI 2.0 (Swagger) specification as JSON.
        This is the machine-readable API contract used by Swagger UI and client code
        generators. The spec is embedded at build time via swaggo.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: OpenAPI spec
      tags:
      - system
  /v1/drugs/autocomplete:
    get:
      description: Returns drug names matching the given prefix, optimized for typeahead
        search UIs. Uses an in-memory prefix index for sub-millisecond response times.
        The prefix must be at least 2 characters. Results include both generic and
        brand names with their type labels.
      parameters:
      - description: Prefix to match (min 2 chars)
        example: ator
        in: query
        name: q
        required: true
        type: string
      - description: 'Max results (default: 10, max: 50)'
        example: 10
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugNameEntry'
              type: array
            type: object
        "400":
          description: Missing or too-short q parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Drug name autocomplete
      tags:
      - drugs
  /v1/drugs/class:
    get:
      description: Looks up a drug by generic or brand name and returns its pharmacological
        classes (EPC, MoA, PE, CS), deduplicated brand names, and generic name. Tries
        generic name first and falls back to brand name search. Use this endpoint
        to discover what class a drug belongs to.
      parameters:
      - description: Drug name (generic or brand)
        example: simvastatin
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugClassResponse'
        "400":
          description: Missing or empty name parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: Drug not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Look up drug class by name
      tags:
      - drugs
  /v1/drugs/classes:
    get:
      description: 'Returns a paginated list of pharmacological drug classes from
        DailyMed. Defaults to EPC (Established Pharmacologic Class) type. Supports
        filtering by class type: epc (pharmacologic class), moa (mechanism of action),
        pe (physiologic effect), cs (chemical structure), or all. Use this endpoint
        to discover available drug classes for browsing or filtering.'
      parameters:
      - description: 'Filter by class type (default: epc)'
        enum:
        - epc
        - moa
        - pe
        - cs
        - all
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        example: 1
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50, max: 100)'
        example: 50
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List drug classes
      tags:
      - drugs
  /v1/drugs/classes/drugs:
    get:
      description: Returns a paginated list of drugs belonging to a specific pharmacological
        class, resolved via FDA NDC data. Returns empty data (not 404) for unknown
        classes. Use this endpoint to find all drugs in a therapeutic category such
        as "HMG-CoA Reductase Inhibitor" or "Proton Pump Inhibitor".
      parameters:
      - description: Pharmacological class name
        example: HMG-CoA Reductase Inhibitor
        in: query
        name: class
        required: true
        type: string
      - description: 'Page number (default: 1)'
        example: 1
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 100, max: 500)'
        example: 100
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "400":
          description: Missing or empty class parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List drugs in a class
      tags:
      - drugs
  /v1/drugs/info:
    get:
      description: Look up a single drug by name or NDC and return a consolidated
        info card with SPL metadata, drug interactions, contraindications, warnings,
        and adverse reactions. When an NDC is provided, it is normalized and resolved
        to a drug name internally. Provide either name or ndc; if both are given,
        ndc takes precedence.
      parameters:
      - description: Drug name
        example: warfarin
        in: query
        name: name
        type: string
      - description: NDC code (any format)
        example: 00069-3150
        in: query
        name: ndc
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugInfoResponse'
        "400":
          description: Missing name or ndc
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: NDC not found or no SPL data
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Drug info card with interactions
      tags:
      - spl
  /v1/drugs/interactions:
    post:
      consumes:
      - application/json
      description: Submit 2 to 10 drug identifiers (by name or NDC) and receive cross-referenced
        interaction warnings from FDA SPL labels. Each drug's Section 7 (Drug Interactions)
        is searched for mentions of the other submitted drugs. NDC identifiers are
        resolved to drug names automatically. Use this endpoint to check a patient's
        medication list for potential interactions.
      parameters:
      - description: Drug identifiers to check
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.InteractionCheckRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.InteractionCheckResponse'
        "400":
          description: Too few/many drugs or invalid input
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Check drug interactions
      tags:
      - spl
  /v1/drugs/names:
    get:
      description: Returns a paginated list of drug names from the DailyMed dataset.
        Supports case-insensitive substring search via the q parameter and type filtering
        by generic or brand. Results are cached from the upstream drug names index.
        Use this endpoint to browse or search the full drug name catalogue.
      parameters:
      - description: Search substring filter (case-insensitive)
        example: atorva
        in: query
        name: q
        type: string
      - description: 'Filter by type: generic, brand, or all'
        enum:
        - generic
        - brand
        - all
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        example: 1
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50, max: 100)'
        example: 50
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List drug names
      tags:
      - drugs
  /v1/drugs/ndc/{ndc}:
    get:
      description: Accepts a product NDC (dash-separated) and returns drug name, generic
        name, and therapeutic classes from the FDA NDC Directory. Supports 5-4, 4-4,
        and 5-3 formats with automatic fallback to zero-padded 5-4 form. Use this
        endpoint when you have an NDC and need to identify the drug.
      parameters:
      - description: Product NDC with dash
        example: 00069-3150
        in: path
        name: ndc
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.DrugDetailResponse'
        "400":
          description: Invalid NDC format
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: No drug found for this NDC
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Look up drug by NDC
      tags:
      - drugs
  /v1/drugs/rxnorm/{rxcui}/generics:
    get:
      description: Returns generic product information for the given RxNorm concept
        identifier, including ingredient names and dose form groups. Use this endpoint
        to find generic equivalents of a branded drug after resolving its RxCUI via
        the search endpoint.
      parameters:
      - description: RxNorm concept unique identifier
        example: "314076"
        in: path
        name: rxcui
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.RxNormGenericResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: RxCUI not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get generic products for an RxCUI
      tags:
      - rxnorm
  /v1/drugs/rxnorm/{rxcui}/ndcs:
    get:
      description: Returns all National Drug Code (NDC) identifiers associated with
        the given RxNorm concept. Use this to map an RxCUI obtained from the search
        endpoint to specific packaged products. Results are cached with a long TTL
        since NDC-to-RxCUI mappings change infrequently.
      parameters:
      - description: RxNorm concept unique identifier
        example: "314076"
        in: path
        name: rxcui
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.RxNormNDCResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: RxCUI not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get NDCs for an RxCUI
      tags:
      - rxnorm
  /v1/drugs/rxnorm/{rxcui}/related:
    get:
      description: 'Returns all related RxNorm concepts grouped by relationship type:
        ingredients, brand names, dose forms, clinical drugs, and branded drugs. Returns
        404 only when all groups are empty, indicating an unknown RxCUI. Individual
        empty groups within a valid response are normal.'
      parameters:
      - description: RxNorm concept unique identifier
        example: "314076"
        in: path
        name: rxcui
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.RxNormRelatedResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: RxCUI not found or has no related concepts
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get related concepts for an RxCUI
      tags:
      - rxnorm
  /v1/drugs/rxnorm/profile:
    get:
      description: Resolves a drug name via RxNorm approximate match, then assembles
        NDCs, generic equivalents, and all related concepts into a single unified
        response. This is a convenience endpoint that combines the results of search,
        NDCs, generics, and related into one call. Use this when you need a complete
        drug profile from a single request.
      parameters:
      - description: Drug name (generic or brand)
        example: metformin
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.RxNormProfile'
        "400":
          description: Missing name parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: Drug not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get unified drug profile
      tags:
      - rxnorm
  /v1/drugs/rxnorm/search:
    get:
      description: Performs an approximate-match search via the RxNorm API and returns
        up to 5 candidates ranked by score, each with an RxCUI. When no exact matches
        are found, spelling suggestions are included to help correct the query. Use
        this as the entry point for RxNorm workflows before calling NDC, generic,
        or related endpoints.
      parameters:
      - description: Drug name to search for
        example: lisinopril
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.RxNormSearchResult'
        "400":
          description: Missing name parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: No drugs found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Search drugs by name (RxNorm)
      tags:
      - rxnorm
  /v1/drugs/spls:
    get:
      description: Searches Structured Product Labels (SPLs) by drug name and returns
        paginated metadata from DailyMed. Each result includes the SPL title, set
        ID, published date, and version. Use the set ID from results to fetch full
        SPL detail with parsed interaction sections.
      parameters:
      - description: Drug name to search
        example: metformin
        in: query
        name: name
        required: true
        type: string
      - description: 'Page number (default: 1)'
        example: 1
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 20, max: 100)'
        example: 20
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.PaginatedResponse'
        "400":
          description: Missing name parameter
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Search SPL documents
      tags:
      - spl
  /v1/drugs/spls/{setid}:
    get:
      description: Retrieves full SPL metadata and parsed safety sections from the
        SPL XML document, including Drug Interactions (Section 7), Contraindications,
        Warnings, and Adverse Reactions. Use this endpoint when you have a set ID
        from the SPL search results and need the complete label content.
      parameters:
      - description: SPL set ID (UUID format)
        example: 2c6ca939-8494-4b3b-8930-81c6c09b0125
        in: path
        name: setid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.SPLDetail'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "404":
          description: SPL not found
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
        "502":
          description: Upstream service unavailable
          schema:
            $ref: '#/definitions/github_com_finish06_drug-gate_internal_model.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get SPL detail with interactions
      tags:
      - spl
  /version:
    get:
      description: Returns build metadata including the semantic version, git commit
        hash, git branch, and Go runtime version. Use this endpoint to verify which
        version of the API is deployed in a given environment.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Build version info
      tags:
      - system
securityDefinitions:
  AdminAuth:
    description: 'Admin bearer token set via `ADMIN_SECRET` environment variable.
      Format: `Bearer {secret}`. Required for all `/admin/*` endpoints.'
    in: header
    name: Authorization
    type: apiKey
  ApiKeyAuth:
    description: Publishable API key for frontend applications. Create one via `POST
      /admin/keys`. Include in all `/v1/*` requests.
    in: header
    name: X-API-Key
    type: apiKey
swagger: "2.0"
tags:
- description: Health, version, metrics, and documentation endpoints. No authentication
    required.
  name: system
- description: Drug lookup by NDC, name, and class — core data from FDA/DailyMed.
    Requires API key.
  name: drugs
- description: RxNorm drug search, profiles, NDCs, generics, and related concepts.
    Requires API key.
  name: rxnorm
- description: Structured Product Labels — drug interaction and safety data from FDA
    labels. Requires API key.
  name: spl
- description: API key management and cache administration. Requires admin bearer
    token.
  name: admin
