groups:
  - name: druggate
    rules:
      - alert: DrugGateHighErrorRate
        expr: |
          (
            sum(rate(druggate_http_requests_total{status_code=~"5.."}[5m]))
            /
            (sum(rate(druggate_http_requests_total[5m])) > 0)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: drug-gate
        annotations:
          summary: "High HTTP error rate on drug-gate"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes. Current rate: {{ $value | humanizePercentage }}."

      - alert: DrugGateHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(druggate_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          service: drug-gate
        annotations:
          summary: "High p95 latency on drug-gate"
          description: "95th percentile request latency exceeds 500ms over the last 5 minutes. Current p95: {{ $value | humanizeDuration }}."

      - alert: DrugGateRedisDown
        expr: druggate_redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: drug-gate
        annotations:
          summary: "Redis is down for drug-gate"
          description: "Redis health check has been failing for more than 1 minute. Auth, rate limiting, and caching are impacted."

      - alert: DrugGateHighRateLimitRejections
        expr: sum(rate(druggate_ratelimit_rejections_total[5m])) * 300 > 50
        for: 5m
        labels:
          severity: warning
          service: drug-gate
        annotations:
          summary: "High rate of rate-limit rejections"
          description: "More than 50 rate-limit rejections per minute sustained over 5 minutes. Possible abuse or misconfigured client."
