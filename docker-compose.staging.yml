networks:
  internal:
    name: internal
    driver: bridge
    external: true

services:
  drug-gate:
    image: dockerhub.calebdunn.tech/finish06/drug-gate:beta
    container_name: drug-gate
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8082:8081"
    environment:
      - CASHDRUGS_URL=http://cash-drugs:8080
      - LISTEN_ADDR=:8081
      - REDIS_URL=drug-gate-redis:6379
      - ADMIN_SECRET=${ADMIN_SECRET}
      - SYSTEM_METRICS_INTERVAL=15s
    depends_on:
      drug-gate-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  drug-gate-redis:
    image: redis:alpine
    container_name: drug-gate-redis
    volumes:
      - drug-gate-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  watchtower:
    image: containrrr/watchtower
    container_name: drug-gate-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/drug-gate/docker-config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - DOCKER_CONFIG=/config.json
    restart: unless-stopped
    networks:
      - internal

volumes:
  drug-gate-redis-data:
