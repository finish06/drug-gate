services:
  drug-gate:
    image: dockerhub.calebdunn.tech/finish06/drug-gate:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - CASHDRUGS_URL=http://host1.du.nn:8083
      - LISTEN_ADDR=:8081
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis-data:
