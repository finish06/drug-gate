services:
  drug-gate:
    build: .
    ports:
      - "8081:8081"
    environment:
      - CASHDRUGS_URL=http://host1.du.nn:8083
      - LISTEN_ADDR=:8081
      - REDIS_URL=redis:6379
      - ADMIN_SECRET=${ADMIN_SECRET:-changeme}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data

volumes:
  redis-data:
